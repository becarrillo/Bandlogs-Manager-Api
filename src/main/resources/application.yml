server:
  port: 8080

spring:
  application:
    name: bandlogs-manager
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST_IP}:1521/FREEPDB1
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET}

rapidapi:
  key: ${RAPIDAPI_KEY}

logging:
  level:
    org:
      springframework:
        jdbc: DEBUG